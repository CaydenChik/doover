name: fuzz-hunt

on:
  push:
    branches: [fuzz-hunt]

jobs:
  # bisect: current crate versions vs pinned-back versions, parse-only vs full
  regression:
    strategy:
      fail-fast: false
      matrix:
        versions: [current, pinned-back]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.versions }}
      - name: pin back tree-sitter versions
        if: matrix.versions == 'pinned-back'
        run: |
          sed -i 's/tree-sitter = "0.25"/tree-sitter = "=0.24.7"/' Cargo.toml
          sed -i 's/tree-sitter-bash = "0.25"/tree-sitter-bash = "=0.23.3"/' Cargo.toml
          cargo update -p tree-sitter -p tree-sitter-bash || cargo update
      - name: stage 1 — parse only
        run: cargo test -p doover-core --test segfault_regressions parse_only -- --nocapture
      - name: stage 2 — full resolve
        run: cargo test -p doover-core --test segfault_regressions full_resolve -- --nocapture
