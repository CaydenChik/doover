name: fuzz-hunt

on:
  push:
    branches: [fuzz-hunt]

jobs:
  stackprobe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: big stack 64M
        run: cargo test -p doover-core --test stackprobe probe_big_stack -- --nocapture
      - name: small stack 128K
        if: always()
        run: cargo test -p doover-core --test stackprobe probe_small_stack -- --nocapture

  minimize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build parse_stdin
        run: cargo build -p doover-core --example parse_stdin
      - name: extract crasher bytes
        run: |
          cat > /tmp/write_crasher.rs <<'EOF'
          fn main() {
              let c = "Z#`|.u` d=?M}M\nu&c?-Ii\\'~{r]&& *'\u{62fe7}~z.\u{bc6a7}(\u{104f28}'>?}Wf)3e]$f@mcf}{\u{cd4b6} ?[)mE*.d{>>)6\n$\u{f109c}dr~Ujc\"-Ca=(*`>vz𪽉}~)&oa=KC)\n\"$`$\u{98975}v`\u{6fd66}!/v\u{e001e}f";
              std::io::Write::write_all(&mut std::io::stdout(), c.as_bytes()).unwrap();
          }
          EOF
          rustc -O /tmp/write_crasher.rs -o /tmp/write_crasher
          /tmp/write_crasher > /tmp/crasher.bin
          wc -c /tmp/crasher.bin
      - name: minimize
        run: bash scripts/minimize.sh /tmp/crasher.bin target/debug/examples/parse_stdin
