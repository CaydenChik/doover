name: fuzz-hunt

on:
  push:
    branches: [fuzz-hunt]

jobs:
  # hard validation of the big-stack fix on Linux before merging to main
  validate-fix:
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: exact-crasher regressions
        run: cargo test -p doover-core --test segfault_regressions -- --nocapture
      - name: property tests, 20k cases
        env:
          PROPTEST_CASES: "20000"
        run: cargo test -p doover-core --test resolver_props
      - name: fuzz 500k iterations
        env:
          DOOVER_FUZZ_ITERS: "500000"
          DOOVER_FUZZ_SEED: ${{ matrix.seed }}
        run: |
          set -o pipefail
          cargo test -p doover-core --test fuzz_hunt -- --nocapture 2>&1 | tail -3
