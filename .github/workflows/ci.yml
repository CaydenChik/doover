name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update && sudo apt-get install -y bats
          fi
      - run: make test

  # Runs the canary test expecting failure; passes only if the failure is
  # reported. Guards the project rule: no claim of completion without green
  # tests — which is only meaningful if red is actually visible.
  honesty-canary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make canary

  # Both crates must stay publishable — the registry data is embedded via
  # include_str!, so a stray moved/renamed data file breaks packaging silently
  # otherwise (it regressed once). Gate it in CI, not ad hoc.
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run -p doover-core
      - run: cargo publish --dry-run -p doover --allow-dirty

  # Non-gating coverage visibility: "comprehensive" claims should be
  # inspectable, not asserted. Prints a per-file summary; never fails the build
  # (line targets would be goodhart bait this early). The bash-oracle and fuzz
  # slices don't run here, so treat numbers as a floor.
  coverage:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --summary-only
