# T1 corpus — round-6 audit (2026-07-07).
# (The trailing-slash-symlink case moved to 150-audit7.yaml: round 7's
# unified symlink-deref scoping made it certain-and-covered instead of the
# round-6 unknown fallback.)

cases:
  # A plain trailing slash on a real directory is fine — no dereference.
  - name: trailing-slash-real-dir-is-scoped
    cmd: "rm -rf builddir/"
    cwd_fixture: ["builddir/"]
    expect: { effect: destructive, paths: ["builddir"], rule: coreutils.rm }

  # Middle-component glob must not match hidden directories (bash parity):
  # `*/f.txt` matches vis/f.txt but not .hid/f.txt.
  - name: middle-component-glob-excludes-hidden-dir
    cmd: "rm -- */f.txt"
    cwd_fixture: ["vis/f.txt", ".hid/f.txt"]
    expect: { effect: destructive, paths: ["vis/f.txt"], rule: coreutils.rm }
